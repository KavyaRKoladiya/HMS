{% extends 'base.html' %}

{% block content %}
<h2>Are you sure you want to delete Dr. {{ doctor.first_name }}?</h2>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="/doctors/" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
