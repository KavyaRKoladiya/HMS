{% extends 'base.html' %}

{% block content %}
<h2>Login</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
</form>

{% if not user.is_authenticated %}
<p>Are you a doctor who was added by the admin? <a href="{% url 'doctor_register' %}">Register here</a>.</p>
{% endif %}
{% endblock %}
