{% extends 'base.html' %}

{% block content %}
<h2>Are you sure you want to delete this appointment?</h2>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="/appointments/" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
